<article class="card">
  <h3>{{ hotel.hotelName }}</h3>
  <p class="meta">{{ hotel.city }} • {{ hotel.location }}</p>
  <p class="rating">{{ hotel.starRating }} ★</p>

  <div class="chips">
    <span class="chip" *ngFor="let amenity of hotel.amenities | slice:0:4">{{ amenity }}</span>
  </div>

  <button class="btn" type="button" (click)="onViewDetails()">View Details</button>
</article>
