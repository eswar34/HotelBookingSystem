<section class="container bookings-page">
  <h1>My Bookings</h1>

  <p *ngIf="loading">Loading bookings...</p>
  <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

  <div class="table-wrap" *ngIf="!loading && !errorMessage">
    <table>
      <thead>
        <tr>
          <th>Hotel</th>
          <th>Room</th>
          <th>Check In</th>
          <th>Check Out</th>
          <th>Total Amount</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let booking of bookings">
          <td>{{ booking.hotelName }}</td>
          <td>{{ booking.roomType }}</td>
          <td>{{ booking.checkInDate | date }}</td>
          <td>{{ booking.checkOutDate | date }}</td>
          <td>${{ booking.totalAmount }}</td>
          <td><span class="badge" [ngClass]="getBadgeClass(booking.status)">{{ booking.status }}</span></td>
          <td>
            <button
              type="button"
              class="cancel-btn"
              [disabled]="booking.status.toLowerCase() !== 'confirmed'"
              (click)="cancelBooking(booking)"
            >
              Cancel
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</section>
