<section class="container list-page">
  <h1>Hotels</h1>

  <form class="search" [formGroup]="searchForm" (ngSubmit)="onSearch()">
    <input type="text" placeholder="Location" formControlName="location" />
    <select formControlName="roomType">
      <option *ngFor="let type of roomTypes" [value]="type">{{ type }}</option>
    </select>
    <select formControlName="amenity">
      <option *ngFor="let amenity of amenityOptions" [value]="amenity">{{ amenity }}</option>
    </select>
    <input type="number" min="0" placeholder="Min Price" formControlName="minPrice" />
    <input type="number" min="0" placeholder="Max Price" formControlName="maxPrice" />
    <input type="date" formControlName="checkInDate" [min]="minCheckInDate" />
    <input type="date" formControlName="checkOutDate" [min]="minCheckOutDate" />
    <button type="submit">Search</button>
  </form>

  <p class="error" *ngIf="dateError">{{ dateError }}</p>
  <p *ngIf="loading">Loading hotels...</p>
  <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
  <p class="empty" *ngIf="!loading && !errorMessage && hotels.length === 0">
    No available hotels found for your search filters.
  </p>

  <div class="grid" *ngIf="!loading && !errorMessage && hotels.length > 0">
    <app-hotel-card
      *ngFor="let hotel of hotels"
      [hotel]="hotel"
      (viewDetails)="onViewDetails($event)"
    />
  </div>
</section>
