<section class="auth-wrap card">
  <h2>Login</h2>
  <p class="hint">Welcome to HotelBookingSystem</p>

  <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
    <label>
      Email
      <input formControlName="email" type="email" placeholder="you@example.com" />
    </label>

    <label>
      Password
      <input formControlName="password" type="password" placeholder="Enter password" />
    </label>

    <p class="error" *ngIf="error">{{ error }}</p>

    <button class="btn btn-primary" [disabled]="loading" type="submit">
      {{ loading ? 'Signing in...' : 'Login' }}
    </button>
  </form>

  <a class="btn btn-success register-btn" routerLink="/register">Register</a>
</section>
